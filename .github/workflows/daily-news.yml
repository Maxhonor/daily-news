name: Daily News Digest
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  news-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sina News
        run: |
          curl -sL "https://news.sina.com.cn/" -o /tmp/sina.html
          python3 << 'PYEOF'
import re
with open("/tmp/sina.html") as f: h = f.read()
ts = set()
bad = ["书签","快捷","标准","智能","登录","注册","首页","排行","开奖"]
for m in re.findall(r'<a[^>]*>([^<]{8,60})</a>', h):
    t = m.strip()
    if any("\u4e00" <= c <= "\u9fff" for c in t) and len(t) >= 6 and not any(x in t for x in bad):
        ts.add(t)
with open("/tmp/cn.txt","w") as f:
    for t in list(ts)[:6]: f.write(f"- {t}\n")
PYEOF
      - name: Fetch Tech News
        run: |
          curl -sL "https://www.36kr.com/newsflashes" -H "User-Agent: Mozilla/5.0" -o /tmp/36kr.html
          python3 << 'PYEOF'
import re
with open("/tmp/36kr.html") as f: h = f.read()
ts = set()
for m in re.findall(r'<a[^>]*href="/newsflashes/[^"]*"[^>]*>([^<]{6,80})</a>', h):
    t = m.strip()
    if any("\u4e00" <= c <= "\u9fff" for c in t): ts.add(t)
with open("/tmp/tech.txt","w") as f:
    for t in list(ts)[:4]: f.write(f"- {t}\n")
PYEOF
      - name: Fetch Intl News
        run: |
          curl -sL "https://feeds.npr.org/1001/rss.xml" -o /tmp/npr.xml
          python3 << 'PYEOF'
import re
with open("/tmp/npr.xml") as f: x = f.read()
ts = []
for m in re.findall(r"<title>(.*?)</title>", x):
    t = m.strip().replace("&apos;","'").replace("&amp;","&")
    if t and t != "NPR Topics: News" and len(t) > 5: ts.append(t)
with open("/tmp/intl.txt","w") as f:
    for t in ts[:5]: f.write(f"- {t}\n")
PYEOF
      - name: Send via PushPlus
        run: |
          CN=$(cat /tmp/cn.txt 2>/dev/null || echo "- 暂无")
          INTL=$(cat /tmp/intl.txt 2>/dev/null || echo "- 暂无")
          TECH=$(cat /tmp/tech.txt 2>/dev/null || echo "- 暂无")
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d '{"token":"4b14ad2c8062439f804d3886e8a87d99","title":"🕐 早间新闻速报","content":"<h3>🕐 早间新闻速报</h3><hr><h4>🇨🇳 国内</h4>'$CN'<br><h4>🌍 国际</h4>'$INTL'<br><h4>📱 科技</h4>'$TECH'<br><hr>每天早八点 Poirot 为您播报 🕵️","template":"html"}'
